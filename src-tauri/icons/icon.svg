<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 纯色深蓝紫背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- 白色K字母图标 - 无任何滤镜，纯白色 -->
  <!-- 左侧粗竖条 -->
  <rect x="140" y="120" width="44" height="272" rx="22" fill="white"/>

  <!-- 中间斜线 -->
  <rect x="210" y="155" width="38" height="202" rx="19" fill="white" transform="rotate(15 229 256)"/>

  <!-- 右侧三个实心圆 -->
  <circle cx="350" cy="175" r="45" fill="white"/>
  <circle cx="405" cy="256" r="40" fill="white"/>
  <circle cx="350" cy="337" r="35" fill="white"/>

  <!-- 连接线 -->
  <rect x="245" y="178" width="90" height="16" rx="8" fill="white" transform="rotate(10 290 186)"/>
  <rect x="260" y="308" width="80" height="16" rx="8" fill="white" transform="rotate(-10 300 316)"/>

  <!-- 黄色点缀 -->
  <circle cx="195" cy="190" r="12" fill="#fbbf24"/>
  <circle cx="170" cy="256" r="10" fill="#fbbf24"/>
  <circle cx="195" cy="322" r="8" fill="#fbbf24"/>
</svg>
