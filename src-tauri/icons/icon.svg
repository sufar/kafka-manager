<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>

    <!-- 强烈发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 内部阴影增加立体感 -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.2" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <!-- 阴影 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- 内圈装饰 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>

  <!-- Kafka 风格的 K 字母变形 - 使用消息队列元素 -->
  <g fill="white" filter="url(#glow)">
    <!-- 左侧竖条 - 消息流 - 更粗更清晰 -->
    <rect x="130" y="110" width="32" height="292" rx="16" fill="white"/>

    <!-- 中间斜线 - 连接流 - 更粗 -->
    <rect x="195" y="150" width="28" height="212" rx="14" fill="white" transform="rotate(20 209 256)"/>

    <!-- 右侧消息气泡/节点 - 更大更清晰 -->
    <circle cx="345" cy="175" r="38" fill="white"/>
    <circle cx="395" cy="256" r="32" fill="white"/>
    <circle cx="345" cy="337" r="28" fill="white"/>

    <!-- 连接线 - 更粗更明显 -->
    <rect x="225" y="185" width="90" height="12" rx="6" fill="white" transform="rotate(15 270 191)"/>
    <rect x="240" y="315" width="80" height="12" rx="6" fill="white" transform="rotate(-15 280 321)"/>
  </g>

  <!-- 装饰性小点 - 表示活跃的消息 - 更亮 -->
  <circle cx="185" cy="195" r="8" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="162" cy="256" r="7" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="185" cy="317" r="6" fill="#fbbf24" filter="url(#glow)"/>
</svg>
