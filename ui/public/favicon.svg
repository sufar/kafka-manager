<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 金色渐变 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- 金色阴影 -->
    <filter id="goldShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#92400e" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 白色圆角背景 -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="white" stroke="#e5e7eb" stroke-width="2"/>

  <!-- 中心金色 Z 字母 -->
  <g transform="translate(256, 256) rotate(20) translate(-256, -256)">
    <!-- Z 字母主体 -->
    <path d="M 156 180 L 356 180 L 356 210 L 200 340 L 356 340 L 356 372 L 156 372 L 156 342 L 312 212 L 156 212 Z"
          fill="url(#goldGradient)"
          filter="url(#goldShadow)"/>
  </g>

  <!-- 装饰性边框 -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.3"/>
</svg>
