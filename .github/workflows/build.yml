name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install system dependencies
        run: |
          brew update
          brew install cmake

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Build frontend
        run: |
          cd ui
          npm run build

      - name: Verify frontend build
        run: |
          ls -la ui/dist

      - name: Build Tauri app (universal)
        working-directory: src-tauri
        run: |
          cargo tauri build --target universal-apple-darwin

      - name: Find DMG file
        working-directory: src-tauri
        run: |
          echo "=== Searching for DMG files ==="
          find . -name '*.dmg' -type f 2>/dev/null
          DMG_PATH=$(find . -name '*.dmg' -type f 2>/dev/null | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG file found!"
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          echo "Found DMG: $DMG_PATH"

      - name: Upload macOS Bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            libcurl4-openssl-dev

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Build frontend
        run: |
          cd ui
          npm run build

      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo tauri build

      - name: Find Linux artifacts
        working-directory: src-tauri
        run: |
          echo "=== Searching for Linux artifacts ==="
          find . -name '*.AppImage' -o -name '*.deb' -type f 2>/dev/null
          APPIMAGE_PATH=$(find . -name '*.AppImage' -type f 2>/dev/null | head -1)
          DEB_PATH=$(find . -name '*.deb' -type f 2>/dev/null | head -1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "Error: No AppImage file found!"
            exit 1
          fi
          if [ -z "$DEB_PATH" ]; then
            echo "Error: No deb file found!"
            exit 1
          fi
          echo "APPIMAGE_PATH=$APPIMAGE_PATH" >> $GITHUB_ENV
          echo "DEB_PATH=$DEB_PATH" >> $GITHUB_ENV
          echo "Found AppImage: $APPIMAGE_PATH"
          echo "Found deb: $DEB_PATH"

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ${{ env.APPIMAGE_PATH }}
          if-no-files-found: error

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Build frontend
        run: |
          cd ui
          npm run build

      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo tauri build

      - name: Find Windows artifacts
        working-directory: src-tauri
        shell: bash
        run: |
          echo "=== Searching for Windows artifacts ==="
          find . -name '*.msi' -o -name '*.exe' -type f 2>/dev/null
          MSI_PATH=$(find . -name '*.msi' -type f 2>/dev/null | head -1)
          EXE_PATH=$(find . -name '*.exe' -type f 2>/dev/null | head -1)
          if [ -z "$MSI_PATH" ]; then
            echo "Error: No MSI file found!"
            exit 1
          fi
          if [ -z "$EXE_PATH" ]; then
            echo "Error: No EXE file found!"
            exit 1
          fi
          echo "MSI_PATH=$MSI_PATH" >> $GITHUB_ENV
          echo "EXE_PATH=$EXE_PATH" >> $GITHUB_ENV
          echo "Found MSI: $MSI_PATH"
          echo "Found EXE: $EXE_PATH"

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ${{ env.MSI_PATH }}
          if-no-files-found: error

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ env.EXE_PATH }}
          if-no-files-found: error

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: ./artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get release notes
        id: release_notes
        run: |
          NOTES=$(gh api /repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq .body)
          # Escape for JSON
          NOTES=$(echo "$NOTES" | jq -Rs '.')
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest.json for Tauri Updater
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # 获取文件名
          DMG_FILE=$(find ./artifacts -name '*.dmg' 2>/dev/null | head -1 | xargs -I {} basename {} || echo "")
          APPIMAGE_FILE=$(find ./artifacts -name '*.AppImage' 2>/dev/null | head -1 | xargs -I {} basename {} || echo "")
          MSI_FILE=$(find ./artifacts -name '*.msi' 2>/dev/null | head -1 | xargs -I {} basename {} || echo "")

          cat > ./artifacts/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": ${{ steps.release_notes.notes }},
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$DMG_FILE",
                "signature": ""
              },
              "darwin-x86_64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$DMG_FILE",
                "signature": ""
              },
              "linux-x86_64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$APPIMAGE_FILE",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$MSI_FILE",
                "signature": ""
              }
            }
          }
          EOF
          echo "Generated latest.json:"
          cat ./artifacts/latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.dmg
            ./artifacts/*.AppImage
            ./artifacts/*.deb
            ./artifacts/*.msi
            ./artifacts/*.exe
            ./artifacts/latest.json
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
