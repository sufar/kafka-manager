name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      dmg_signature: ${{ steps.sign.outputs.dmg_signature }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install system dependencies
        run: |
          brew update
          brew install cmake

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Build frontend
        run: |
          cd ui
          npm run build

      - name: Verify frontend build
        run: |
          ls -la ui/dist

      - name: Build Tauri app (universal)
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build --target universal-apple-darwin

          # 手动为 DMG 文件生成签名（如果 Tauri 没有自动生成）
          echo "=== Checking for generated signature files ==="
          # 使用绝对路径
          GITHUB_WORKSPACE="${{ github.workspace }}"
          DMG_PATH=$(find ${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle -type f -name '*.dmg' 2>/dev/null | head -1)
          if [ -n "$DMG_PATH" ]; then
            SIG_PATH="${DMG_PATH}.sig"
            if [ ! -f "$SIG_PATH" ]; then
              echo "No .sig file found at $SIG_PATH, generating signature manually..."
              # 在 src-tauri 目录执行（tauri.conf.json 所在位置）
              cd "${GITHUB_WORKSPACE}/src-tauri"
              DMG_FILE=$(basename "$DMG_PATH")
              echo "Signing file: $DMG_FILE"
              echo "File path: $DMG_PATH"
              echo "Current dir: $(pwd)"
              # 使用文件相对路径（从 src-tauri 到 bundle 目录）
              REL_PATH="../${DMG_PATH#${GITHUB_WORKSPACE}/}"
              echo "Relative path: $REL_PATH"
              # 如果没有密码，不传递 --password 参数
              if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
                SIGN_OUTPUT=$(cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$REL_PATH" 2>&1)
              else
                SIGN_OUTPUT=$(cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" "$REL_PATH" 2>&1)
              fi
              SIGN_EXIT_CODE=$?
              echo "Sign command output: $SIGN_OUTPUT"
              echo "Sign exit code: $SIGN_EXIT_CODE"
              # 签名文件应该生成在 bundle 目录（文件旁边）
              echo "Looking for signature file at: $SIG_PATH"
              if [ -f "$SIG_PATH" ]; then
                echo "Signature file found at expected location"
              else
                echo "Searching for .sig files:"
                find "${GITHUB_WORKSPACE}/target" -name '*.sig' 2>/dev/null
              fi

              # 最终检查
              if [ -f "$SIG_PATH" ]; then
                echo "Signature file generated at $SIG_PATH"
                echo "Signature file content:"
                cat "$SIG_PATH"
              else
                echo "Warning: Signature file not found at expected location"
                echo "Searching for .sig files in workspace:"
                find ${GITHUB_WORKSPACE} -name '*.sig' 2>/dev/null
              fi
            else
              echo "Signature file already exists at $SIG_PATH"
              echo "Signature file content:"
              cat "$SIG_PATH"
            fi
          fi

      - name: Find DMG file and signature
        id: sign
        working-directory: src-tauri
        run: |
          echo "=== Searching for DMG files ==="
          GITHUB_WORKSPACE="${{ github.workspace }}"
          DMG_PATH=$(find ${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle -type f -name '*.dmg' 2>/dev/null | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG file found!"
            echo "Debug: listing ${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle:"
            ls -la ${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          echo "Found DMG: $DMG_PATH"

          # 查找 .app 目录（便携版）
          APP_DIR=$(find ${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle -type d -name '*.app' 2>/dev/null | head -1)
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "Found APP bundle: $APP_DIR"

          # 打包 .app 为便携 zip（macOS 便携版就是 .app 目录）
          if [ -n "$APP_DIR" ] && [ -d "$APP_DIR" ]; then
            # 从 Cargo.toml 读取版本号
            VERSION=$(grep -E '^version\s*=' "$GITHUB_WORKSPACE/src-tauri/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            APP_BASENAME=$(basename "$APP_DIR" .app)
            APP_ZIP="${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle/${APP_BASENAME}-v${VERSION}.zip"
            cd "$(dirname "$APP_DIR")"
            zip -r "$APP_ZIP" "$(basename "$APP_DIR")"
            echo "APP_ZIP=$APP_ZIP" >> $GITHUB_ENV
            echo "Created portable zip: $APP_ZIP ($(du -h "$APP_ZIP" | cut -f1))"
          else
            echo "APP_ZIP=" >> $GITHUB_ENV
          fi

          # 查找签名文件（Tauri 2.x 可能生成 .sig 或 .sig.json）
          SIG_PATH="${DMG_PATH}.sig"
          SIG_JSON_PATH="${DMG_PATH}.sig.json"

          echo "Looking for signature at: $SIG_PATH"
          if [ -f "$SIG_PATH" ]; then
            echo "Found signature file: $SIG_PATH"
            SIG_CONTENT=$(cat "$SIG_PATH" | tr -d '\n')
            echo "dmg_signature=$SIG_CONTENT" >> $GITHUB_OUTPUT
            echo "Signature content (first 50 chars): ${SIG_CONTENT:0:50}..."
          elif [ -f "$SIG_JSON_PATH" ]; then
            echo "Found signature JSON file: $SIG_JSON_PATH"
            SIG_CONTENT=$(jq -r '.signature' "$SIG_JSON_PATH" 2>/dev/null || echo "")
            echo "dmg_signature=$SIG_CONTENT" >> $GITHUB_OUTPUT
            echo "Signature from JSON (first 50 chars): ${SIG_CONTENT:0:50}..."
          else
            echo "Warning: No signature file found!"
            echo "Listing bundle directory:"
            ls -la ${GITHUB_WORKSPACE}/target/universal-apple-darwin/release/bundle/
            echo "dmg_signature=" >> $GITHUB_OUTPUT
          fi

      - name: Upload macOS Bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.DMG_PATH }}.sig
            ${{ env.DMG_PATH }}.sig.json
            ${{ env.APP_ZIP }}
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    outputs:
      appimage_signature: ${{ steps.sign.outputs.appimage_signature }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            libcurl4-openssl-dev

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Build frontend
        run: |
          cd ui
          npm run build

      - name: Build Tauri app
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build

          # 手动为 AppImage 生成签名（如果 Tauri 没有自动生成）
          echo "=== Checking for generated signature files ==="
          # 使用绝对路径
          GITHUB_WORKSPACE="${{ github.workspace }}"
          APPIMAGE_PATH=$(find ${GITHUB_WORKSPACE}/target/release/bundle -type f -name '*.AppImage' 2>/dev/null | head -1)
          if [ -n "$APPIMAGE_PATH" ]; then
            SIG_PATH="${APPIMAGE_PATH}.sig"
            if [ ! -f "$SIG_PATH" ]; then
              echo "No .sig file found at $SIG_PATH, generating signature manually..."
              # 在 src-tauri 目录执行（tauri.conf.json 所在位置）
              cd "${GITHUB_WORKSPACE}/src-tauri"
              APPIMAGE_FILE=$(basename "$APPIMAGE_PATH")
              echo "Signing file: $APPIMAGE_FILE"
              echo "File path: $APPIMAGE_PATH"
              echo "Current dir: $(pwd)"
              # 使用文件相对路径（从 src-tauri 到 bundle 目录）
              REL_PATH="../${APPIMAGE_PATH#${GITHUB_WORKSPACE}/}"
              echo "Relative path: $REL_PATH"
              # 如果没有密码，不传递 --password 参数
              if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
                SIGN_OUTPUT=$(cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$REL_PATH" 2>&1)
              else
                SIGN_OUTPUT=$(cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" "$REL_PATH" 2>&1)
              fi
              SIGN_EXIT_CODE=$?
              echo "Sign command output: $SIGN_OUTPUT"
              echo "Sign exit code: $SIGN_EXIT_CODE"
              # 签名文件应该生成在 bundle 目录（文件旁边）
              echo "Looking for signature file at: $SIG_PATH"
              if [ -f "$SIG_PATH" ]; then
                echo "Signature file found at expected location"
              else
                echo "Searching for .sig files:"
                find "${GITHUB_WORKSPACE}/target" -name '*.sig' 2>/dev/null
              fi

              # 最终检查
              if [ -f "$SIG_PATH" ]; then
                echo "Signature file generated at $SIG_PATH"
                echo "Signature file content:"
                cat "$SIG_PATH"
              else
                echo "Warning: Signature file not found at expected location"
                echo "Searching for .sig files in workspace:"
                find ${GITHUB_WORKSPACE} -name '*.sig' 2>/dev/null
              fi
            else
              echo "Signature file already exists at $SIG_PATH"
              echo "Signature file content:"
              cat "$SIG_PATH"
            fi
          fi

      - name: Debug bundle output
        working-directory: src-tauri
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Full directory tree ==="
          find target/release/bundle -type f 2>/dev/null || echo "bundle dir not found"
          echo "=== List all .AppImage and .deb files ==="
          find . -type f \( -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null

      - name: Find Linux artifacts and signatures
        id: sign
        working-directory: src-tauri
        run: |
          echo "=== Searching for Linux artifacts ==="
          # 使用绝对路径
          GITHUB_WORKSPACE="${{ github.workspace }}"
          APPIMAGE_PATH=$(find ${GITHUB_WORKSPACE}/target/release/bundle -type f -name '*.AppImage' 2>/dev/null | head -1)
          DEB_PATH=$(find ${GITHUB_WORKSPACE}/target/release/bundle -type f -name '*.deb' 2>/dev/null | head -1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "Error: No AppImage file found!"
            echo "Debug: listing ${GITHUB_WORKSPACE}/target/release/bundle:"
            ls -la ${GITHUB_WORKSPACE}/target/release/bundle/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          if [ -z "$DEB_PATH" ]; then
            echo "Error: No deb file found!"
            exit 1
          fi
          echo "APPIMAGE_PATH=$APPIMAGE_PATH" >> $GITHUB_ENV
          echo "DEB_PATH=$DEB_PATH" >> $GITHUB_ENV
          echo "Found AppImage: $APPIMAGE_PATH"
          echo "Found deb: $DEB_PATH"

          # 查找签名文件（Tauri 2.x 可能生成 .sig 或 .sig.json）
          SIG_PATH="${APPIMAGE_PATH}.sig"
          SIG_JSON_PATH="${APPIMAGE_PATH}.sig.json"

          echo "Looking for signature at: $SIG_PATH"
          echo "Checking if file exists:"
          ls -la "$SIG_PATH" 2>/dev/null || echo ".sig file not found"
          ls -la "$SIG_JSON_PATH" 2>/dev/null || echo ".sig.json file not found"

          # 列出 bundle 目录中的所有 .sig 文件
          echo "All .sig files in bundle directory:"
          find "$(dirname "$APPIMAGE_PATH")" -name '*.sig' 2>/dev/null || echo "No .sig files found"

          if [ -f "$SIG_PATH" ]; then
            echo "Found signature file: $SIG_PATH"
            echo "Signature file size: $(wc -c < "$SIG_PATH") bytes"
            SIG_CONTENT=$(cat "$SIG_PATH" | tr -d '\n')
            echo "Signature content (first 50 chars): ${SIG_CONTENT:0:50}..."
            if [ -z "$SIG_CONTENT" ]; then
              echo "ERROR: Signature file is empty!"
            fi
            echo "appimage_signature=$SIG_CONTENT" >> $GITHUB_OUTPUT
          elif [ -f "$SIG_JSON_PATH" ]; then
            echo "Found signature JSON file: $SIG_JSON_PATH"
            SIG_CONTENT=$(jq -r '.signature' "$SIG_JSON_PATH" 2>/dev/null || echo "")
            echo "Signature from JSON (first 50 chars): ${SIG_CONTENT:0:50}..."
            echo "appimage_signature=$SIG_CONTENT" >> $GITHUB_OUTPUT
          else
            echo "Warning: No signature file found!"
            echo "appimage_signature=" >> $GITHUB_OUTPUT
          fi

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            ${{ env.APPIMAGE_PATH }}
            ${{ env.APPIMAGE_PATH }}.sig
            ${{ env.APPIMAGE_PATH }}.sig.json
          if-no-files-found: warn

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      msi_signature: ${{ steps.sign.outputs.msi_signature }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Build frontend
        run: |
          cd ui
          npm run build

      - name: Build Tauri app
        working-directory: src-tauri
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build

          # 手动为 MSI 生成签名（如果 Tauri 没有自动生成）
          echo "=== Checking for generated signature files ==="
          # 使用绝对路径
          GITHUB_WORKSPACE="${{ github.workspace }}"
          MSI_PATH=$(find ${GITHUB_WORKSPACE}/target/release/bundle -type f -name '*.msi' 2>/dev/null | head -1)
          if [ -n "$MSI_PATH" ]; then
            SIG_PATH="${MSI_PATH}.sig"
            if [ ! -f "$SIG_PATH" ]; then
              echo "No .sig file found at $SIG_PATH, generating signature manually..."
              # 在 src-tauri 目录执行（tauri.conf.json 所在位置）
              cd "${GITHUB_WORKSPACE}/src-tauri"
              MSI_FILE=$(basename "$MSI_PATH")
              echo "Signing file: $MSI_FILE"
              echo "File path: $MSI_PATH"
              echo "Current dir: $(pwd)"
              # 在 Windows 上，find 返回的是 Windows 路径，需要转换为 Unix 风格路径
              # 使用 cygpath 将 Windows 路径转换为 Unix 风格
              if command -v cygpath &> /dev/null; then
                MSI_PATH_UNIX=$(cygpath -u "$MSI_PATH")
                echo "Converted Windows path to Unix: $MSI_PATH_UNIX"
                MSI_PATH="$MSI_PATH_UNIX"
              fi
              # 使用文件相对路径（从 src-tauri 到 bundle 目录）
              REL_PATH="${MSI_PATH#${GITHUB_WORKSPACE}/}"
              echo "Relative path: $REL_PATH"
              # 如果没有密码，不传递 --password 参数
              if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
                SIGN_OUTPUT=$(cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$REL_PATH" 2>&1)
              else
                SIGN_OUTPUT=$(cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" "$REL_PATH" 2>&1)
              fi
              SIGN_EXIT_CODE=$?
              echo "Sign command output: $SIGN_OUTPUT"
              echo "Sign exit code: $SIGN_EXIT_CODE"
              # 签名文件应该生成在 bundle 目录（文件旁边）
              echo "Looking for signature file at: $SIG_PATH"
              if [ -f "$SIG_PATH" ]; then
                echo "Signature file found at expected location"
              else
                echo "Searching for .sig files:"
                find "${GITHUB_WORKSPACE}/target" -name '*.sig' 2>/dev/null
              fi

              # 最终检查
              if [ -f "$SIG_PATH" ]; then
                echo "Signature file generated at $SIG_PATH"
                echo "Signature file content:"
                cat "$SIG_PATH"
              else
                echo "Warning: Signature file not found at expected location"
                echo "Searching for .sig files in workspace:"
                find ${GITHUB_WORKSPACE} -name '*.sig' 2>/dev/null
              fi
            else
              echo "Signature file already exists at $SIG_PATH"
              echo "Signature file content:"
              cat "$SIG_PATH"
            fi
          fi

      - name: Find Windows artifacts and signatures
        id: sign
        working-directory: src-tauri
        shell: bash
        run: |
          echo "=== Searching for Windows artifacts ==="
          # 使用绝对路径
          GITHUB_WORKSPACE="${{ github.workspace }}"
          MSI_PATH=$(find ${GITHUB_WORKSPACE}/target/release/bundle -type f -name '*.msi' 2>/dev/null | head -1)
          EXE_PATH=$(find ${GITHUB_WORKSPACE}/target/release/bundle -type f -name '*.exe' 2>/dev/null | head -1)
          APP_DIR=$(find ${GITHUB_WORKSPACE}/target/release/bundle -maxdepth 1 -type d -name '*app' 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            APP_DIR=$(find ${GITHUB_WORKSPACE}/target/release/bundle -maxdepth 1 -type d -name 'Kafka*' 2>/dev/null | head -1)
          fi
          if [ -z "$MSI_PATH" ]; then
            echo "Error: No MSI file found!"
            echo "Debug: listing ${GITHUB_WORKSPACE}/target/release/bundle:"
            ls -la ${GITHUB_WORKSPACE}/target/release/bundle/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          if [ -z "$EXE_PATH" ]; then
            echo "Error: No EXE file found!"
            exit 1
          fi
          echo "MSI_PATH=$MSI_PATH" >> $GITHUB_ENV
          echo "EXE_PATH=$EXE_PATH" >> $GITHUB_ENV
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "Found MSI: $MSI_PATH"
          echo "Found EXE: $EXE_PATH"
          echo "Found APP bundle: $APP_DIR"

      - name: Create Windows Portable Zip
        shell: pwsh
        run: |
          $bundleDir = "$env:GITHUB_WORKSPACE/target/release/bundle"
          $releaseDir = "$env:GITHUB_WORKSPACE/target/release"
          $portableDir = Join-Path $bundleDir 'portable-package'
          # 从 Cargo.toml 读取版本号
          $version = (Select-String -Path "$env:GITHUB_WORKSPACE/src-tauri/Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          $appZip = Join-Path $bundleDir "Kafka-Manager-Portable-v${version}.zip"

          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          # 调试：列出所有可能的位置
          Write-Host "=== Looking for exe in target/release ==="
          Get-ChildItem $releaseDir -Filter '*.exe' -Recurse -Depth 1 | ForEach-Object { Write-Host "  $($_.FullName) ($([math]::Round($_.Length/1MB, 1)) MB)" }

          # 尝试直接找原始 exe
          $appExe = Get-ChildItem -Path $releaseDir -Filter 'Kafka Manager*.exe' -Exclude '*setup*', '*-unins*' | Select-Object -First 1
          if ($appExe) {
            Write-Host "Found app exe directly: $($appExe.FullName) ($([math]::Round($appExe.Length/1MB, 1)) MB)"
            Copy-Item $appExe.FullName $portableDir -Force
          } else {
            # 从 NSIS 安装器中提取 app exe
            $nsisExe = Get-ChildItem -Path $bundleDir/nsis -Filter '*.exe' | Select-Object -First 1
            if ($nsisExe) {
              Write-Host "Found NSIS installer: $($nsisExe.FullName)"
              # NSIS 安装器内嵌的 exe 在 `$PLUGINSDIR\app-64.exe`
              $tempDir = Join-Path $env:TEMP 'portable-extract'
              if (Test-Path $tempDir) { Remove-Item -Recurse -Force $tempDir }
              New-Item -ItemType Directory -Path $tempDir | Out-Null

              $7zPath = "C:\Program Files\7-Zip\7z.exe"
              if (Test-Path $7zPath) {
                Write-Host "Extracting with 7z..."
                & $7zPath x $nsisExe.FullName "-o$tempDir" "`$PLUGINSDIR\app-64.exe" -y 2>&1 | ForEach-Object { Write-Host "  $_" }
                $extractedExe = Join-Path $tempDir '$PLUGINSDIR' 'app-64.exe'
                if (Test-Path $extractedExe) {
                  Write-Host "Extracted app exe: $extractedExe ($([math]::Round((Get-Item $extractedExe).Length/1MB, 1)) MB)"
                  Copy-Item $extractedExe $portableDir -Force
                } else {
                  Write-Host "Failed to extract app-64.exe, trying full extraction..."
                  Remove-Item -Recurse -Force $tempDir
                  New-Item -ItemType Directory -Path $tempDir | Out-Null
                  & $7zPath x $nsisExe.FullName "-o$tempDir" -y 2>&1 | Select-Object -Last 5 | ForEach-Object { Write-Host "  $_" }
                  # 找最大的非安装器 exe
                  $foundExe = Get-ChildItem -Path $tempDir -Filter '*.exe' -Recurse | Where-Object { $_.Name -notmatch 'setup|uninstall|7z' } | Sort-Object Length -Descending | Select-Object -First 1
                  if ($foundExe) {
                    Write-Host "Found app exe via full extraction: $($foundExe.FullName) ($([math]::Round($foundExe.Length/1MB, 1)) MB)"
                    Copy-Item $foundExe.FullName $portableDir -Force
                  }
                }
              } else {
                Write-Host "7-Zip not found at $7zPath"
              }
              Remove-Item -Recurse -Force $tempDir -ErrorAction SilentlyContinue
            } else {
              Write-Host "No NSIS installer found either"
            }
          }

          # 确认 exe 已复制
          $copiedExe = Get-ChildItem $portableDir -Filter '*.exe' | Select-Object -First 1
          if ($copiedExe) {
            Write-Host "App exe ready in portable package: $($copiedExe.Name) ($([math]::Round($copiedExe.Length/1MB, 1)) MB)"
          } else {
            Write-Host "Warning: No exe in portable package!"
          }

          # 列出便携包内容
          Write-Host "=== Portable package contents ==="
          Get-ChildItem $portableDir -Recurse | ForEach-Object {
            if ($_.PSIsContainer) {
              Write-Host "  [DIR] $_"
            } else {
              Write-Host "  $_ ($([math]::Round($_.Length/1MB, 2)) MB)"
            }
          }

          # 打包为 zip
          $items = Get-ChildItem $portableDir
          if ($items) {
            Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath $appZip -Force
            Write-Host "Created portable zip: $appZip ($([math]::Round((Get-Item $appZip).Length/1MB, 1)) MB)"
          } else {
            Write-Host "Warning: portable package directory is empty"
          }
          Remove-Item -Recurse -Force $portableDir -ErrorAction SilentlyContinue

          # 设置环境变量
          if (Test-Path $appZip) {
            "APP_ZIP=$appZip" >> $env:GITHUB_ENV
            "HAS_PORTABLE_ZIP=true" >> $env:GITHUB_ENV
          } else {
            "APP_ZIP=/nonexistent/placeholder.zip" >> $env:GITHUB_ENV
            "HAS_PORTABLE_ZIP=false" >> $env:GITHUB_ENV
          }

      - name: Check portable zip
        shell: bash
        run: |
          echo "APP_ZIP=${{ env.APP_ZIP }}"
          if [ -f "$APP_ZIP" ]; then
            ls -la "$APP_ZIP"
          fi

          # 查找签名文件（Tauri 2.x 可能生成 .sig 或 .sig.json）
          SIG_PATH="${MSI_PATH}.sig"
          SIG_JSON_PATH="${MSI_PATH}.sig.json"

          echo "Looking for signature at: $SIG_PATH"
          if [ -f "$SIG_PATH" ]; then
            echo "Found signature file: $SIG_PATH"
            SIG_CONTENT=$(cat "$SIG_PATH" | tr -d '\n')
            echo "msi_signature=$SIG_CONTENT" >> $GITHUB_OUTPUT
            echo "Signature content (first 50 chars): ${SIG_CONTENT:0:50}..."
          elif [ -f "$SIG_JSON_PATH" ]; then
            echo "Found signature JSON file: $SIG_JSON_PATH"
            SIG_CONTENT=$(jq -r '.signature' "$SIG_JSON_PATH" 2>/dev/null || echo "")
            echo "msi_signature=$SIG_CONTENT" >> $GITHUB_OUTPUT
            echo "Signature from JSON (first 50 chars): ${SIG_CONTENT:0:50}..."
          else
            echo "Warning: No signature file found!"
            echo "Listing bundle directory:"
            ls -la ${GITHUB_WORKSPACE}/target/release/bundle/
            echo "msi_signature=" >> $GITHUB_OUTPUT
          fi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: |
            ${{ env.MSI_PATH }}
            ${{ env.MSI_PATH }}.sig
            ${{ env.MSI_PATH }}.sig.json
          if-no-files-found: warn

      - name: Upload Windows Portable
        if: env.HAS_PORTABLE_ZIP == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: ${{ env.APP_ZIP }}
          if-no-files-found: warn

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ env.EXE_PATH }}
          if-no-files-found: error

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: ./artifacts
          merge-multiple: true

      # 展平 artifacts 目录（artifact 可能包含子目录结构）
      - name: Flatten artifact files
        run: |
          echo "=== Before flatten ==="
          find ./artifacts -type f | sort
          # 将所有文件移动到 artifacts 根目录
          find ./artifacts -type f -exec mv {} ./artifacts/ \;
          # 清理空目录
          find ./artifacts -mindepth 1 -type d -empty -delete 2>/dev/null || true
          echo ""
          echo "=== After flatten ==="
          find ./artifacts -type f | sort

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get release notes
        id: release_notes
        run: |
          NOTES=$(gh api /repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq .body)
          # 如果 body 为空，使用默认值
          if [ -z "$NOTES" ]; then
            NOTES="No release notes"
          fi
          # Escape for JSON
          NOTES=$(echo "$NOTES" | jq -Rs '.')
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest.json for Tauri Updater
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # 获取文件名
          DMG_FILE=$(find ./artifacts -name '*.dmg' 2>/dev/null | head -1 | xargs -I {} basename {} || echo "")
          APPIMAGE_FILE=$(find ./artifacts -name '*.AppImage' 2>/dev/null | head -1 | xargs -I {} basename {} || echo "")
          MSI_FILE=$(find ./artifacts -name '*.msi' 2>/dev/null | head -1 | xargs -I {} basename {} || echo "")

          # 从 job 输出获取签名
          DMG_SIG="${{ needs.build-macos.outputs.dmg_signature }}"
          APPIMAGE_SIG="${{ needs.build-linux.outputs.appimage_signature }}"
          MSI_SIG="${{ needs.build-windows.outputs.msi_signature }}"

          cat > ./artifacts/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": ${{ steps.release_notes.outputs.notes }},
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$DMG_FILE",
                "signature": "$DMG_SIG"
              },
              "darwin-x86_64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$DMG_FILE",
                "signature": "$DMG_SIG"
              },
              "linux-x86_64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$APPIMAGE_FILE",
                "signature": "$APPIMAGE_SIG"
              },
              "windows-x86_64": {
                "url": "https://github.com/sufar/kafka-manager/releases/download/${{ github.ref_name }}/$MSI_FILE",
                "signature": "$MSI_SIG"
              }
            }
          }
          EOF
          echo "Generated latest.json:"
          cat ./artifacts/latest.json

          # 验证 JSON 格式
          echo "Validating JSON..."
          if jq empty ./artifacts/latest.json; then
            echo "latest.json is valid JSON"
          else
            echo "ERROR: latest.json is invalid JSON!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.dmg
            ./artifacts/*.AppImage
            ./artifacts/*.deb
            ./artifacts/*.msi
            ./artifacts/*.exe
            ./artifacts/*.zip
            ./artifacts/latest.json
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
